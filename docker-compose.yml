version: "3.9"

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  celery:
    build: ./backend
    command: celery -A config worker -l info
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mongo
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - mongo
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
  frontend_node_modules:
